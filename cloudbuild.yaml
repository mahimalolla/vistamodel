steps:
  - name: 'python:3.10'
    id: 'lint-scripts'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install pyflakes --quiet
        python -m pyflakes scripts/ || true
        python -m pyflakes dags/ || true
        echo "Lint complete"

  - name: 'python:3.10'
    id: 'run-tests'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install pytest --quiet
        if [ -d "tests/" ]; then
          pytest tests/ -v
        else
          echo "No tests directory — skipping"
        fi

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-training-image'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if git diff --name-only HEAD~1 HEAD | grep -q "^training/"; then
          echo "training/ changed — rebuilding"
          docker build --platform linux/amd64 --no-cache \
            -t us-central1-docker.pkg.dev/mlops-489703/translation-models/gemma-trainer:$SHORT_SHA \
            -t us-central1-docker.pkg.dev/mlops-489703/translation-models/gemma-trainer:latest \
            ./training
        else
          echo "training/ unchanged — skipping"
        fi

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-training-image'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if git diff --name-only HEAD~1 HEAD | grep -q "^training/"; then
          docker push us-central1-docker.pkg.dev/mlops-489703/translation-models/gemma-trainer:$SHORT_SHA
        else
          echo "Skipping — training image not rebuilt"
        fi

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-inference-image'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if git diff --name-only HEAD~1 HEAD | grep -q "^inference/"; then
          echo "inference/ changed — rebuilding"
          docker build --platform linux/amd64 --no-cache \
            -t us-central1-docker.pkg.dev/mlops-489703/translation-models/inference-api:$SHORT_SHA \
            -t us-central1-docker.pkg.dev/mlops-489703/translation-models/inference-api:latest \
            ./inference
        else
          echo "inference/ unchanged — skipping"
        fi

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-inference-image'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if git diff --name-only HEAD~1 HEAD | grep -q "^inference/"; then
          docker push us-central1-docker.pkg.dev/mlops-489703/translation-models/inference-api:$SHORT_SHA
        else
          echo "Skipping — inference image not rebuilt"
        fi

  - name: 'python:3.10'
    id: 'evaluate-model'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if git diff --name-only HEAD~1 HEAD | grep -qE "^(training/|scripts/)"; then
          pip install google-cloud-storage sacrebleu --quiet
          python scripts/evaluate_model.py \
            --model_gcs=gs://livespeechinterpreter-training/models/gemma3-4b-translation-v17 \
            --test_gcs=gs://livespeechinterpreter/datasets/v2_approved/test.jsonl \
            --slices_gcs=gs://livespeechinterpreter/datasets/v2_approved \
            --bleu_threshold=25 \
            --bias_threshold=0.30
        else
          echo "No model changes — skipping evaluation"
        fi

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if git diff --name-only HEAD~1 HEAD | grep -q "^inference/"; then
          gcloud run deploy translation-api \
            --image=us-central1-docker.pkg.dev/mlops-489703/translation-models/inference-api:$SHORT_SHA \
            --platform=managed \
            --region=us-central1 \
            --memory=16Gi \
            --cpu=4 \
            --timeout=300 \
            --min-instances=1 \
            --max-instances=2 \
            --service-account=mlops-pipeline@mlops-489703.iam.gserviceaccount.com \
            --set-env-vars=ADAPTER_GCS=gs://livespeechinterpreter-training/models/gemma3-4b-translation-v17,PROJECT_ID=mlops-489703,BQ_DATASET=translation_monitoring,BQ_TABLE=inference_logs,TOKENIZERS_PARALLELISM=false,MLFLOW_TRACKING_URI=https://mlflow-server-1050963407386.us-central1.run.app \
            --allow-unauthenticated
        else
          echo "inference/ unchanged — skipping deploy"
        fi

  - name: 'python:3.10'
    id: 'log-build'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install google-cloud-bigquery --quiet
        python -c "
        from google.cloud import bigquery
        from datetime import datetime
        client = bigquery.Client(project='mlops-489703')
        table_id = 'mlops-489703.translation_monitoring.cicd_builds'
        rows = [{'timestamp': datetime.utcnow().isoformat(), 'commit_sha': '$SHORT_SHA', 'branch': '$BRANCH_NAME', 'build_id': '$BUILD_ID', 'status': 'SUCCESS', 'trigger': 'github_push'}]
        client.insert_rows_json(table_id, rows)
        print('Build logged to BigQuery')
        "

substitutions:
  _REGION: 'us-central1'
  _PROJECT: 'mlops-489703'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '3600s'